<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kalkulasi Tour & Travel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Background Pemandangan (Langit dan Laut) */
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #333;
            min-height: 100vh;
        }
        
        /* Overlay agar teks mudah dibaca */
        .overlay {
            background-color: rgba(255, 255, 255, 0.85);
            min-height: 100vh;
            padding: 20px;
            border-radius: 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        /* Judul dan Sub Judul */
        .header-title {
            text-align: center;
            margin-bottom: 5px;
        }
        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #36aba9;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .sub-title {
            font-size: 1.2rem;
            color: #36aba9;
            font-weight: 500;
            margin: 0 0 25px 0;
            padding-bottom: 15px;
            border-bottom: 2px solid #36aba9;
            display: inline-block;
        }
        .title-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-control {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #1c4392;
        }
        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #36aba9;
            box-shadow: 0 0 5px rgba(54, 171, 169, 0.5);
        }
        
        /* Tombol Utama */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #36aba9, #1c4392);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 10px rgba(28, 67, 146, 0.4);
        }
        
        /* Tombol Hapus */
        .btn-delete-container {
            margin-top: 15px;
            text-align: right;
        }
        .btn-delete {
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-delete:hover {
            background-color: #c0392b;
        }
        
        /* Tabel dengan Gradasi */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9rem;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        /* Header Tabel Gradasi */
        th {
            background: linear-gradient(135deg, #36aba9 0%, #1c4392 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        tr {
            background-color: white;
            transition: background 0.2s;
        }
        tr:hover {
            background-color: #f0f8ff;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        /* Kolom Aksi */
        .action-column {
            text-align: center;
            width: 80px;
        }
        .btn-hapus {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s;
        }
        .btn-hapus:hover {
            background-color: #c0392b;
        }
        
        .currency {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
        }
        
        .total-column {
            color: #1c4392;
            font-weight: bold;
        }

        /* Notifikasi */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            display: none;
        }
        .notification.success {
            background-color: #27ae60;
        }
        .notification.error {
            background-color: #e74c3c;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            .input-group {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 15px;
            }
            th, td {
                padding: 8px;
                font-size: 0.75rem;
            }
            .main-title {
                font-size: 1.8rem;
            }
            .sub-title {
                font-size: 1rem;
            }
            .action-column {
                width: 60px;
            }
            .btn-hapus {
                padding: 4px 8px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="container">
        <!-- Judul dan Sub Judul -->
        <div class="title-wrapper">
            <div class="header-title">
                <h1 class="main-title">TXTRAVEL</h1>
            </div>
            <div>
                <p class="sub-title">Detail Harga Produk Tour</p>
            </div>
        </div>
        
        <div class="input-group">
            <div class="form-control">
                <label>Nama Produk / Paket</label>
                <input type="text" id="namaProduk" placeholder="Contoh: Paket Umroh Reguler">
            </div>
            <div class="form-control">
                <label>Tanggal Keberangkatan</label>
                <input type="date" id="tanggal">
            </div>
        </div>

        <div class="input-group">
            <div class="form-control">
                <label>Harga Dasar (Rp)</label>
                <input type="number" id="hargaDasar" placeholder="0">
            </div>
            <div class="form-control">
                <label>Visa Grup (Rp)</label>
                <input type="number" id="visa" placeholder="0">
            </div>
        </div>

        <div class="input-group">
            <div class="form-control">
                <label>Tipping (Rp)</label>
                <input type="number" id="tipping" placeholder="0">
            </div>
            <div class="form-control" style="justify-content: flex-end;">
                <button class="btn-primary" onclick="hitungDanTambah()">💾 Hitung & Simpan</button>
            </div>
        </div>

        <table id="tabelData">
            <thead>
                <tr>
                    <th>Tgl Berangkat</th>
                    <th>Nama Produk</th>
                    <th class="currency">Harga Dasar</th>
                    <th class="currency">Visa</th>
                    <th class="currency">Tipping</th>
                    <th class="currency">PPN (1.1%)</th>
                    <th class="currency">TOTAL</th>
                    <th class="action-column">Aksi</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data akan muncul di sini -->
            </tbody>
        </table>
        
        <div class="btn-delete-container">
            <button class="btn-delete" onclick="hapusSemuaData()">🗑️ Hapus Semua Data</button>
        </div>
    </div>
</div>

<!-- Notifikasi -->
<div id="notification" class="notification"></div>

<script>
    // Key untuk LocalStorage
    const STORAGE_KEY = 'txtravel_data';

    // Fungsi format Rupiah
    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { 
            style: 'currency', 
            currency: 'IDR', 
            minimumFractionDigits: 0 
        }).format(angka);
    }

    // Fungsi tampilkan notifikasi
    function showNotification(message, type) {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.className = `notification ${type}`;
        notification.style.display = 'block';
        
        setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    }

    // Fungsi ambil data dari LocalStorage
    function getData() {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
    }

    // Fungsi simpan data ke LocalStorage
    function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // Fungsi render tabel
    function renderTabel() {
        const data = getData();
        const tabel = document.getElementById('tabelData').getElementsByTagName('tbody')[0];
        tabel.innerHTML = '';

        data.forEach((item, index) => {
            const barisBaru = tabel.insertRow();

            const selTgl = barisBaru.insertCell(0);
            const selNama = barisBaru.insertCell(1);
            const selDasar = barisBaru.insertCell(2);
            const selVisa = barisBaru.insertCell(3);
            const selTipping = barisBaru.insertCell(4);
            const selPpn = barisBaru.insertCell(5);
            const selTotal = barisBaru.insertCell(6);
            const selAksi = barisBaru.insertCell(7);

            selTgl.innerHTML = item.tanggal;
            selNama.innerHTML = item.nama;
            selDasar.innerHTML = formatRupiah(item.hargaDasar);
            selVisa.innerHTML = formatRupiah(item.visa);
            selTipping.innerHTML = formatRupiah(item.tipping);
            selPpn.innerHTML = formatRupiah(item.ppn);
            selTotal.innerHTML = `<strong>${formatRupiah(item.total)}</strong>`;
            selAksi.innerHTML = `<button class="btn-hapus" onclick="hapusData(${index})">Hapus</button>`;

            // Styling
            [selDasar, selVisa, selTipping, selPpn].forEach(sel => sel.className = 'currency');
            selTotal.className = 'currency total-column';
            selAksi.className = 'action-column';
        });
    }

    // Fungsi hitung dan tambah data
    function hitungDanTambah() {
        const nama = document.getElementById('namaProduk').value;
        const tanggal = document.getElementById('tanggal').value;
        const hargaDasar = parseFloat(document.getElementById('hargaDasar').value) || 0;
        const visa = parseFloat(document.getElementById('visa').value) || 0;
        const tipping = parseFloat(document.getElementById('tipping').value) || 0;

        if (nama === "" || tanggal === "") {
            showNotification('Mohon isi Nama Produk dan Tanggal Keberangkatan!', 'error');
            return;
        }

        // Format tanggal
        const tglObj = new Date(tanggal);
        const tglFormat = tglObj.toLocaleDateString('id-ID', { 
            day: 'numeric', 
            month: 'short', 
            year: 'numeric' 
        });

        // Kalkulasi
        const ppn = hargaDasar * 0.011;
        const total = hargaDasar + visa + tipping + ppn;

        // Ambil data lama, tambahkan data baru
        const data = getData();
        data.push({
            tanggal: tglFormat,
            nama: nama,
            hargaDasar: hargaDasar,
            visa: visa,
            tipping: tipping,
            ppn: ppn,
            total: total
        });

        // Simpan dan render
        saveData(data);
        renderTabel();
        showNotification('Data berhasil disimpan!', 'success');

        // Reset form
        document.getElementById('namaProduk').value = '';
        document.getElementById('tanggal').value = '';
        document.getElementById('hargaDasar').value = '';
        document.getElementById('visa').value = '';
        document.getElementById('tipping').value = '';
    }

    // Fungsi hapus data per baris
    function hapusData(index) {
        if (confirm('Apakah Anda yakin ingin menghapus data ini?')) {
            const data = getData();
            data.splice(index, 1);
            saveData(data);
            renderTabel();
            showNotification('Data berhasil dihapus!', 'success');
        }
    }

    // Fungsi hapus semua data
    function hapusSemuaData() {
        if (confirm('Apakah Anda yakin ingin menghapus SEMUA data? Tindakan ini tidak dapat dibatalkan!')) {
            localStorage.removeItem(STORAGE_KEY);
            renderTabel();
            showNotification('Semua data berhasil dihapus!', 'success');
        }
    }

    // Load data saat halaman dibuka
    document.addEventListener('DOMContentLoaded', function() {
        renderTabel();
    });
</script>

</body>
</html>
