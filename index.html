<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX Travel - Product Manager</title>
    <!-- Link ke file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>TX Travel</h1>
            <h2>Product Manager & Costing</h2>
        </header>

        <!-- Form Input -->
        <form id="productForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="tanggal">Tanggal</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div class="form-group">
                    <label for="namaProduk">Nama Produk</label>
                    <input type="text" id="namaProduk" placeholder="Contoh: Tour Bali 3H2N" required>
                </div>
                <div class="form-group">
                    <label for="hargaBasic">Harga Basic (Rp)</label>
                    <input type="number" id="hargaBasic" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label for="ppn">PPN (1.1%)</label>
                    <input type="text" id="ppn" readonly style="background-color: #eee; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label for="visaGrup">Visa Grup (Rp)</label>
                    <input type="number" id="visaGrup" placeholder="0">
                </div>
                <div class="form-group">
                    <label for="tipping">Tipping (Rp)</label>
                    <input type="number" id="tipping" placeholder="0">
                </div>
                <div class="form-group">
                    <label for="komisi">Komisi (Rp)</label>
                    <input type="number" id="komisi" placeholder="0">
                </div>
                
                <button type="submit" class="btn-add">+ Tambah Produk</button>
            </div>
        </form>

        <!-- Tabel Output -->
        <div class="table-responsive">
            <table id="productTable">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Produk</th>
                        <th>Harga Basic</th>
                        <th>PPN (1.1%)</th>
                        <th>Visa</th>
                        <th>Tipping</th>
                        <th>Komisi</th>
                        <th>Total Harga (Netto)</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data akan masuk di sini -->
                </tbody>
            </table>
        </div>

        <!-- Tombol Reset Data -->
        <div style="text-align: right; margin-top: 20px;">
            <button type="button" onclick="resetAllData()" style="background-color: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                Hapus Semua Data
            </button>
        </div>
    </div>

    <!-- Script JavaScript -->
    <script>
        // Kunci penyimpanan di Local Storage
        const STORAGE_KEY = 'txTravelData';

        // Fungsi format Rupiah
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }

        // Fungsi untuk mengambil data dari Local Storage
        function loadData() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const tableBody = document.querySelector('#productTable tbody');
            tableBody.innerHTML = ''; // Kosongkan tabel sebelum load

            data.forEach((item, index) => {
                const newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td>${item.tanggal}</td>
                    <td>${item.namaProduk}</td>
                    <td>${formatRupiah(item.hargaBasic)}</td>
                    <td>${formatRupiah(item.ppn)}</td>
                    <td>${formatRupiah(item.visaGrup)}</td>
                    <td>${formatRupiah(item.tipping)}</td>
                    <td>${formatRupiah(item.komisi)}</td>
                    <td class="total-row">${formatRupiah(item.totalHarga)}</td>
                    <td><button class="delete-btn" onclick="hapusBaris(${index})">Hapus</button></td>
                `;
                tableBody.appendChild(newRow);
            });
        }

        // Fungsi untuk menyimpan data ke Local Storage
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Event Listener saat tombol Submit ditekan
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. Ambil nilai dari input
            const tanggal = document.getElementById('tanggal').value;
            const namaProduk = document.getElementById('namaProduk').value;
            const hargaBasic = parseFloat(document.getElementById('hargaBasic').value) || 0;
            const visaGrup = parseFloat(document.getElementById('visaGrup').value) || 0;
            const tipping = parseFloat(document.getElementById('tipping').value) || 0;
            const komisi = parseFloat(document.getElementById('komisi').value) || 0;

            // 2. Hitung PPN (1.1%)
            const ppn = hargaBasic * 0.011;

            // 3. Hitung Total Harga (Tanpa Komisi)
            const totalHarga = hargaBasic + ppn + visaGrup + tipping;

            // 4. Buat Object Data Baru
            const newData = {
                tanggal,
                namaProduk,
                hargaBasic,
                ppn,
                visaGrup,
                tipping,
                komisi,
                totalHarga
            };

            // 5. Ambil data lama, tambahkan data baru, dan simpan
            const currentData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            currentData.push(newData);
            saveData(currentData);

            // 6. Tampilkan di tabel (tanpa reload)
            const tableBody = document.querySelector('#productTable tbody');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${tanggal}</td>
                <td>${namaProduk}</td>
                <td>${formatRupiah(hargaBasic)}</td>
                <td>${formatRupiah(ppn)}</td>
                <td>${formatRupiah(visaGrup)}</td>
                <td>${formatRupiah(tipping)}</td>
                <td>${formatRupiah(komisi)}</td>
                <td class="total-row">${formatRupiah(totalHarga)}</td>
                <td><button class="delete-btn" onclick="hapusBaris(${currentData.length - 1})">Hapus</button></td>
            `;
            tableBody.appendChild(newRow);

            // 7. Reset Form
            document.getElementById('productForm').reset();
            document.getElementById('tanggal').valueAsDate = new Date();
        });

        // Fungsi Hapus Baris
        function hapusBaris(index) {
            if(confirm('Yakin ingin menghapus data ini?')) {
                let currentData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                
                // Hapus data dari array
                currentData.splice(index, 1);
                
                // Simpan kembali ke Local Storage
                saveData(currentData);
                
                // Refresh tabel
                loadData();
            }
        }

        // Fungsi Reset Semua Data
        function resetAllData() {
            if(confirm('PERINGATAN: Semua data akan dihapus permanen. Lanjutkan?')) {
                localStorage.removeItem(STORAGE_KEY);
                loadData(); // Ini akan mengosongkan tabel
            }
        }

        // Load data saat halaman pertama kali dibuka
        window.onload = function() {
            loadData();
            document.getElementById('tanggal').valueAsDate = new Date();
        };
    </script>
</body>
</html>
